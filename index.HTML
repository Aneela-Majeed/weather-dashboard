<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather Dashboard - Aneela</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <div class="header">
            <h1>
                <i class="fas fa-cloud-sun"></i>
                Weather Dashboard
            </h1>
            <p>Get real-time weather updates for any city</p>
        </div>

        <!-- Search Section -->
        <div class="search-section">
            <div class="search-box">
                <input type="text" id="cityInput" placeholder="Enter city name..." onkeypress="handleKeyPress(event)">
                <button id="searchBtn" onclick="getWeather()">
                    <i class="fas fa-search"></i> Search
                </button>
            </div>
            <div class="unit-toggle">
                <button id="celsiusBtn" class="unit-btn active" onclick="toggleUnit('C')">°C</button>
                <button id="fahrenheitBtn" class="unit-btn" onclick="toggleUnit('F')">°F</button>
            </div>
        </div>

        <!-- Loading Spinner -->
        <div id="loading" class="loading">
            <div class="spinner"></div>
            <p>Loading weather data...</p>
        </div>

        <!-- Error Message -->
        <div id="errorMsg" class="error-msg"></div>

        <!-- Current Weather -->
        <div id="currentWeather" class="current-weather" style="display: none;">
            <div class="weather-card">
                <div class="city-info">
                    <h2 id="cityName">London</h2>
                    <p id="dateTime"></p>
                </div>
                <div class="weather-main">
                    <div class="weather-icon">
                        <img id="weatherIcon" src="" alt="Weather icon">
                    </div>
                    <div class="temperature">
                        <span id="temp">--</span>
                        <span class="unit" id="tempUnit">°C</span>
                    </div>
                    <div class="condition" id="condition">--</div>
                </div>
                <div class="weather-details">
                    <div class="detail-item">
                        <i class="fas fa-tint"></i>
                        <span>Humidity</span>
                        <strong id="humidity">--%</strong>
                    </div>
                    <div class="detail-item">
                        <i class="fas fa-wind"></i>
                        <span>Wind Speed</span>
                        <strong id="windSpeed">-- km/h</strong>
                    </div>
                    <div class="detail-item">
                        <i class="fas fa-compress-alt"></i>
                        <span>Pressure</span>
                        <strong id="pressure">-- hPa</strong>
                    </div>
                    <div class="detail-item">
                        <i class="fas fa-eye"></i>
                        <span>Visibility</span>
                        <strong id="visibility">-- km</strong>
                    </div>
                </div>
            </div>
        </div>

        <!-- 5-Day Forecast -->
        <div id="forecast" class="forecast" style="display: none;">
            <h3>
                <i class="fas fa-calendar-week"></i>
                5-Day Forecast
            </h3>
            <div class="forecast-container" id="forecastContainer"></div>
        </div>

        <!-- Recent Searches -->
        <div class="recent-searches" id="recentSearches" style="display: none;">
            <h3>
                <i class="fas fa-history"></i>
                Recent Searches
            </h3>
            <div class="recent-list" id="recentList"></div>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
